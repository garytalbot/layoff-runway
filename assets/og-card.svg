<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title>Layoff Runway social share card</title>
  <desc>Dark gradient card with Layoff Runway headline and summary points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0" r="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="56" y="56" width="1088" height="518" rx="28" fill="rgba(15,23,42,0.78)" stroke="rgba(148,163,184,0.25)" />
  <text x="100" y="170" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4">POST-LAYOFF SURVIVAL PLANNING</text>
  <text x="100" y="265" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">Layoff Runway</text>
  <text x="100" y="340" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34">Estimate how long your cash lasts, your monthly burn,</text>
  <text x="100" y="388" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34">and what to cut first.</text>
  <g transform="translate(100 452)">
    <rect width="300" height="72" rx="18" fill="#082f49" stroke="#38bdf8" />
    <text x="28" y="46" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">No signup required</text>
  </g>
  <g transform="translate(420 452)">
    <rect width="280" height="72" rx="18" fill="#082f49" stroke="#38bdf8" />
    <text x="28" y="46" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Private in-browser</text>
  </g>
  <g transform="translate(720 452)">
    <rect width="328" height="72" rx="18" fill="#082f49" stroke="#38bdf8" />
    <text x="28" y="46" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">2-minute runway estimate</text>
  </g>
</svg>
